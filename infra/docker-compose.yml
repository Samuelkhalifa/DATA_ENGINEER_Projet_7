services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # internal Docker network
      - "29092:29092" # external host machine
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9001:9001"  # Console UI
      - "9002:9000"  # S3 API
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: "server /data --console-address ':9001'"

  airflow-webserver:
    build: .
    #image: apache/airflow:2.9.3
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-scheduler
      - postgres
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: False
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      PIP_ADDITIONAL_REQUIREMENTS: dbt-core dbt-snowflake
      PYTHONPATH: /opt/airflow  # needed in order to make python reckognize a path where it can reach other modules/functions, in airflow container, referenced to DAG fucntionning
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ../infra/airflow/functions:/opt/airflow/functions
      - ../dbt:/opt/airflow/dbt
      - ../dbt/.dbt_profiles:/opt/airflow/dbt/.dbt_profiles
    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db migrate && 
      airflow users create --username $$AIRFLOW_USER --password $$AIRFLOW_PASSWORD --firstname admin --lastname admin --role Admin --email admin@example.com && 
      airflow webserver
      "

  airflow-scheduler:
    build: .
    #image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - postgres
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: False
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      PIP_ADDITIONAL_REQUIREMENTS: dbt-core dbt-snowflake
      PYTHONPATH: /opt/airflow  # needed in order to make python reckognize a path where it can reach other modules/functions, in airflow container, referenced to DAG fucntionning
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ../infra/airflow/functions:/opt/airflow/functions
      - ../dbt:/opt/airflow/dbt
      - ../dbt/.dbt_profiles:/opt/airflow/dbt/.dbt_profiles
    command: "airflow scheduler"

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  kafka_data:
  postgres_data:
